name: Build & attach plugin ZIP

# Builds a clean, WordPress-installable heirloom-seo.zip and attaches it to the
# GitHub Release whenever you push a version tag (e.g. v0.7.9). The homepage's
# Download button points at the always-current asset:
#   https://github.com/TedSlaterDev/heirloom-seo/releases/latest/download/heirloom-seo.zip
#
# To cut a release after bumping the version:  git tag v0.7.9 && git push origin v0.7.9
# (or create the tag/release from GitHub Desktop or the GitHub web UI).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:        # also runnable by hand from the Actions tab (uploads a build artifact)

permissions:
  contents: write           # needed to create/update the Release

jobs:
  release-zip:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Assemble a clean plugin folder
        run: |
          mkdir -p build/heirloom-seo
          rsync -a --exclude-from='.distignore' ./ build/heirloom-seo/
          cd build && zip -rqX heirloom-seo.zip heirloom-seo
          echo "Built ZIP contents:" && unzip -l build/heirloom-seo.zip || true

      - name: Attach the ZIP to the release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: build/heirloom-seo.zip
          fail_on_unmatched_files: true
          generate_release_notes: true

      - name: Upload as a build artifact (manual runs)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: heirloom-seo-zip
          path: build/heirloom-seo.zip
